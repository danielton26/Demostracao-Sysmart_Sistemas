<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Notes</title>

<style>
:root {
  --bg: #0b1220;
  --sidebar: #0f172a;
  --card: #111827;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --border: #1f2937;
  --accent: #3b82f6;
}

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: Inter, Arial;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: var(--sidebar);
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.header img {
  height: 32px;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 60px;
  left: 0;
  width: 250px;
  height: calc(100vh - 60px);
  background: var(--sidebar);
  padding: 20px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
}

.search {
  width: 100%;
  padding: 8px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: none;
  background: var(--card);
  color: var(--text);
}

.sidebar a {
  display: block;
  color: var(--muted);
  text-decoration: none;
  padding: 6px;
  border-radius: 6px;
  margin-bottom: 4px;
}

.sidebar a.active {
  background: var(--accent);
  color: white;
}

/* CONTENT */
.content {
  margin-left: 250px;
  margin-top: 60px;
  padding: 40px;
  max-width: 900px;
}

/* VERSION */
.version {
  margin-bottom: 50px;
}

.version h2 {
  margin-bottom: 5px;
}

.date {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 10px;
}

/* TAGS */
.tag {
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-right: 6px;
}

.new { background: #22c55e; }
.fix { background: #ef4444; }
.improve { background: #3b82f6; }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="images/logo.png">
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <input class="search" placeholder="Buscar..." oninput="filterVersions(this.value)">
  <div id="menu"></div>
</div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<script>
function label(type) {
  if (type === 'new') return 'Novo';
  if (type === 'fix') return 'Fix';
  if (type === 'improve') return 'Melhoria';
  return type;
}

function render(data) {
  const content = document.getElementById('content');
  const menu = document.getElementById('menu');

  content.innerHTML = '';
  menu.innerHTML = '';

  data.forEach((v, index) => {

    // MENU
    const link = document.createElement('a');
    link.href = '#' + v.version;
    link.innerText = 'v' + v.version;
    link.dataset.target = v.version;
    menu.appendChild(link);

    // CONTENT
    const div = document.createElement('div');
    div.className = 'version';
    div.id = v.version;

    let html = `<h2>Versão ${v.version} ${index === 0 ? '🔥' : ''}</h2>`;
    html += `<div class="date">${v.date}</div>`;

    v.changes.forEach(c => {
      html += `<p><span class="tag ${c.type}">${label(c.type)}</span> ${c.text}</p>`;
    });

    div.innerHTML = html;
    content.appendChild(div);
  });

  activateScrollSpy();
}

/* SCROLL SPY (menu ativo) */
function activateScrollSpy() {
  const links = document.querySelectorAll('.sidebar a');
  const sections = document.querySelectorAll('.version');

  window.addEventListener('scroll', () => {
    let current = '';

    sections.forEach(section => {
      const top = section.offsetTop - 100;
      if (scrollY >= top) {
        current = section.id;
      }
    });

    links.forEach(link => {
      link.classList.remove('active');
      if (link.dataset.target === current) {
        link.classList.add('active');
      }
    });
  });
}

/* SEARCH */
function filterVersions(query) {
  query = query.toLowerCase();
  const versions = document.querySelectorAll('.version');

  versions.forEach(v => {
    const text = v.innerText.toLowerCase();
    v.style.display = text.includes(query) ? 'block' : 'none';
  });
}

/* LOAD JSON */
fetch('releases.json')
  .then(res => res.json())
  .then(data => {
    data.sort((a, b) =>
      b.version.localeCompare(a.version, undefined, { numeric: true })
    );
    render(data);
  })
  .catch(() => {
    document.getElementById('content').innerHTML =
      '<p>Erro ao carregar releases.json</p>';
  });

</script>

</body>
</html>
