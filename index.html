<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Notes</title>

<style>
:root {
  --bg: #0f172a;
  --sidebar: #020617;
  --card: #111827;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #1f2937;
  --accent: #3b82f6;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  display: flex;
}

.sidebar {
  width: 260px;
  background: var(--sidebar);
  height: 100vh;
  padding: 20px;
  position: fixed;
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  max-width: 140px;
  background: white;
  padding: 8px;
  border-radius: 10px;
}

.search {
  width: 100%;
  padding: 8px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: none;
  background: var(--card);
  color: var(--text);
}

.sidebar .project-title {
  margin-top: 15px;
  font-weight: bold;
}

.sidebar a {
  display: block;
  color: var(--muted);
  text-decoration: none;
  padding: 6px;
}

.content {
  margin-left: 260px;
  padding: 40px;
}

.project-header {
  font-size: 22px;
  margin-top: 40px;
}

.version {
  margin-bottom: 30px;
  padding: 20px;
  background: var(--card);
  border-radius: 10px;
}

.badge {
  background: var(--accent);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.date {
  color: var(--muted);
  font-size: 13px;
}

.tag {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-right: 6px;
}

.new { background: #22c55e; }
.fix { background: #ef4444; }
.improve { background: #3b82f6; }
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">
    <img src="images/logo.png">
  </div>

  <input class="search" placeholder="Buscar..." oninput="filterVersions(this.value)">
  <div id="menu"></div>
</div>

<div class="content" id="content"></div>

<script>
function label(type) {
  if (type === 'new') return 'Novo';
  if (type === 'fix') return 'Fix';
  if (type === 'improve') return 'Melhoria';
  return type;
}

function render(data) {
  const content = document.getElementById('content');
  const menu = document.getElementById('menu');

  content.innerHTML = '';
  menu.innerHTML = '';

  data.forEach(project => {

    // título do projeto
    const header = document.createElement('div');
    header.className = 'project-header';
    header.innerText = project.project;
    content.appendChild(header);

    // menu projeto
    const menuTitle = document.createElement('div');
    menuTitle.className = 'project-title';
    menuTitle.innerText = project.project;
    menu.appendChild(menuTitle);

    project.releases.forEach((v, index) => {

      const id = project.project + '-' + v.version;

      // menu link
      const link = document.createElement('a');
      link.href = '#' + id;
      link.innerText = 'v' + v.version;
      menu.appendChild(link);

      // card
      const div = document.createElement('div');
      div.className = 'version';
      div.id = id;

      let html = `
        <h3>${v.version} ${index === 0 ? '<span class="badge">Latest</span>' : ''}</h3>
        <div class="date">${v.date}</div>
      `;

      v.changes.forEach(c => {
        html += `<p><span class="tag ${c.type}">${label(c.type)}</span> ${c.text}</p>`;
      });

      div.innerHTML = html;
      content.appendChild(div);
    });

  });
}

function filterVersions(query) {
  query = query.toLowerCase();
  document.querySelectorAll('.version').forEach(v => {
    v.style.display = v.innerText.toLowerCase().includes(query) ? 'block' : 'none';
  });
}

// 🔥 FETCH COM DEBUG (IMPORTANTE)
fetch('releases.json')
  .then(res => {
    console.log('STATUS:', res.status);
    if (!res.ok) throw new Error('Arquivo não encontrado');
    return res.json();
  })
  .then(data => render(data))
  .catch(err => {
    console.error('ERRO:', err);
    document.getElementById('content').innerHTML =
      '<h2>Erro ao carregar releases.json</h2><p>Verifique o caminho ou o nome do arquivo.</p>';
  });
</script>

</body>
</html>
