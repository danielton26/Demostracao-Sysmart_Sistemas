<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Release Notes</title>

  <style>
    :root {
      --bg: #0f172a;
      --sidebar: #020617;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --card: #111827;
      --border: #1f2937;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
    }

    .sidebar {
      width: 260px;
      background: var(--sidebar);
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      border-right: 1px solid var(--border);
    }

    .logo {
      font-weight: bold;
      margin-bottom: 20px;
    }

    .search {
      width: 100%;
      padding: 8px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
      background: var(--card);
      color: var(--text);
    }

    .sidebar a {
      display: block;
      color: var(--muted);
      text-decoration: none;
      margin: 6px 0;
    }

    .content {
      flex: 1;
      padding: 40px;
      max-width: 900px;
    }

    .version {
      margin-bottom: 40px;
      padding: 20px;
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .date {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-right: 6px;
    }

    .new { background: #22c55e; }
    .fix { background: #ef4444; }
    .improve { background: #3b82f6; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🚀 Release Notes</div>
  <input class="search" placeholder="Buscar..." oninput="filterVersions(this.value)" />
  <div id="menu"></div>
</div>

<div class="content" id="content"></div>

<script>
  function label(type) {
    if (type === 'new') return 'Novo';
    if (type === 'fix') return 'Fix';
    if (type === 'improve') return 'Melhoria';
    return type;
  }

  function render(data) {
    const content = document.getElementById('content');
    const menu = document.getElementById('menu');

    content.innerHTML = '';
    menu.innerHTML = '';

    data.forEach(v => {
      // menu
      const link = document.createElement('a');
      link.href = '#' + v.version;
      link.innerText = 'v' + v.version;
      menu.appendChild(link);

      // conteúdo
      const div = document.createElement('div');
      div.className = 'version';
      div.id = v.version;

      let html = `<h2>Versão ${v.version}</h2>`;
      html += `<div class="date">${v.date}</div>`;

      v.changes.forEach(c => {
        html += `<p><span class="tag ${c.type}">${label(c.type)}</span> ${c.text}</p>`;
      });

      div.innerHTML = html;
      content.appendChild(div);
    });
  }

  function filterVersions(query) {
    query = query.toLowerCase();
    const versions = document.querySelectorAll('.version');

    versions.forEach(v => {
      const text = v.innerText.toLowerCase();
      v.style.display = text.includes(query) ? 'block' : 'none';
    });
  }

  // 🔥 Aqui carrega o JSON externo
  fetch('releases.json')
    .then(res => res.json())
    .then(data => render(data))
    .catch(err => {
      document.getElementById('content').innerHTML =
        '<p>Erro ao carregar releases.json</p>';
      console.error(err);
    });
</script>

</body>
</html>
